<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Templates | CV Studio</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo-area"><img src="Assets/cvstudio-logo.png" alt="CV Studio" class="logo-img"></a>
    <nav class="nav"><a href="templates.html" class="active">Templates</a><a href="recursos.html">Recursos</a><a href="#">Preços</a><a href="https://rafacodehub.github.io/rafaelamorim-portfolio/" target="_blank" rel="noopener">Blog</a></nav>
    <div class="header-actions"><a href="#" class="login">Entrar</a><a href="builder.html" class="btn btn-small">Começar agora</a></div>
  </header>
  <main class="templates-page">
    <section class="templates-head">
      <h1>Templates</h1><p>Escolha um modelo real: cada template muda a estrutura do currículo.</p>
      <div class="filters">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="minimalistas">Minimalistas</button>
        <button class="filter-btn" data-filter="corporativos">Corporativos</button>
        <button class="filter-btn" data-filter="modernos">Modernos</button>
        <button class="filter-btn" data-filter="criativos">Criativos</button>
        <button class="filter-btn" data-filter="profissionais">Profissionais</button>
      </div>
    </section>
    <section class="template-grid real-template-grid">
      <article class="template-card" data-template="minimal" data-category="minimalistas"><div class="template-preview-card prev-minimal"><div class="p-side"><span></span><p></p><p></p><p></p></div><div class="p-main"><h3></h3><h4></h4><p></p><p></p><p></p><h4></h4><p></p></div></div><h3>Minimal Clean</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
      <article class="template-card" data-template="word" data-category="corporativos"><div class="template-preview-card prev-word"><h3></h3><div></div><p></p><p></p><h4></h4><p></p><p></p><h4></h4><p></p></div><h3>Corporate Word</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
      <article class="template-card" data-template="blue" data-category="corporativos"><div class="template-preview-card prev-blue"><div class="p-side"><span></span><p></p><p></p><p></p></div><div class="p-main"><h3></h3><h4></h4><p></p><p></p><p></p></div></div><h3>Corporate Blue</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
      <article class="template-card" data-template="creative" data-category="criativos"><div class="template-preview-card prev-creative"><div class="blob"></div><span></span><h3></h3><p></p><p></p><h4></h4><p></p><p></p></div><h3>Creative</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
      <article class="template-card" data-template="black" data-category="modernos"><div class="template-preview-card prev-black"><div class="top"><span></span><h3></h3></div><div class="cols"><div><p></p><p></p><p></p></div><div><h4></h4><p></p><p></p><h4></h4><p></p></div></div></div><h3>Executive Black</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
      <article class="template-card" data-template="gold" data-category="profissionais"><div class="template-preview-card prev-gold"><div class="p-side"><span></span><p></p><p></p><p></p></div><div class="p-main"><h3></h3><h4></h4><p></p><p></p><p></p></div></div><h3>Premium Gold</h3><button class="template-select-btn" type="button">Selecionar template</button></article>
    </section>
  </main>
  <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
